services:
  mongo:
    image: mongo:7
    container_name: nanoom-mongo
    ports:
      - "27017:27017"
    volumes:
      - ./storage/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: nanoom-backend
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017}
      MONGO_DB: ${MONGO_DB:-nanoom_erp}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-secret-key-123456}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL:-http://localhost:3300}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3300,http://localhost:3400}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      KAKAO_OAUTH_CLIENT_ID: ${KAKAO_OAUTH_CLIENT_ID:-}
      KAKAO_OAUTH_CLIENT_SECRET: ${KAKAO_OAUTH_CLIENT_SECRET:-}
      AUTH_DEV_SEED_ENABLED: ${AUTH_DEV_SEED_ENABLED:-true}
      AUTH_DEV_SEED_PROVIDER: ${AUTH_DEV_SEED_PROVIDER:-google}
      AUTH_DEV_SEED_EMAIL: ${AUTH_DEV_SEED_EMAIL:-admin@localhost}
      AUTH_DEV_SEED_PROVIDER_USER_ID: ${AUTH_DEV_SEED_PROVIDER_USER_ID:-dev-master}
      AUTH_DEV_SEED_NAME: ${AUTH_DEV_SEED_NAME:-개발 관리자}
      UDMS_STORAGE_DIR: ${UDMS_STORAGE_DIR:-/app/data/storage}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./storage/udms:/app/data/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    container_name: nanoom-frontend
    command: sh -c "npm ci && npm run dev"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://backend:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws/display}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3300:3400"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  frontend_node_modules:
  frontend_next:
