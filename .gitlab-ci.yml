stages:
  - build
  - deploy

# GitLab Runner 요구 설정 (NAS 도커 컨테이너 Runner):
# config.toml:
#   [[runners]]
#     executor = "docker"
#     [runners.docker]
#       volumes = ["/cache",
#                  "/var/run/docker.sock:/var/run/docker.sock",
#                  "/volume1/docker:/volume1/docker"]
#
# ※ /volume1/docker/nanoom-project  ← 프로젝트 파일 (env, compose)
# ※ /volume1/docker/nanoom-prod     ← main 브랜치 데이터 (자동 생성)
# ※ /volume1/docker/nanoom-dev      ← dev  브랜치 데이터 (자동 생성)
#
# GitLab 컨테이너 레지스트리 불필요:
# Runner와 배포가 같은 NAS이므로 빌드한 이미지를 로컬에서 바로 사용

variables:
  # 로컬 이미지 태그 (레지스트리 없이 사용)
  IMAGE_PREFIX: nanoom-erp
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_BUILDKIT: "1"

# ─────────────────────────────────────────────
# 1. 이미지 빌드 (로컬 Docker에 저장, push 없음)
#    NEXT_PUBLIC_* 는 빌드 타임에 번들에 embed되므로
#    브랜치별로 --build-arg 로 URL 주입
# ─────────────────────────────────────────────
build:
  stage: build
  image: docker:24.0.5
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        NEXT_PUBLIC_API_BASE_URL="https://erp.nanoom.org"
        NEXT_PUBLIC_WS_URL="wss://erp.nanoom.org/ws/display"
      else
        NEXT_PUBLIC_API_BASE_URL="http://erp.nanoom.org:8001"
        NEXT_PUBLIC_WS_URL="ws://erp.nanoom.org:8001/ws/display"
      fi

    # 백엔드 빌드 (prod 타겟)
    - docker build --target prod
        -t $IMAGE_PREFIX/backend:$CI_COMMIT_REF_SLUG
        ./backend

    # 프론트엔드 빌드 (prod 타겟 + NEXT_PUBLIC_* 빌드타임 주입)
    - docker build --target prod
        --build-arg NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL
        --build-arg NEXT_PUBLIC_WS_URL=$NEXT_PUBLIC_WS_URL
        -t $IMAGE_PREFIX/frontend:$CI_COMMIT_REF_SLUG
        ./frontend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"

# ─────────────────────────────────────────────
# 2. 배포 (로컬 이미지 사용, pull 없음)
# ─────────────────────────────────────────────
deploy:
  stage: deploy
  image: docker:24.0.5
  before_script:
    # docker compose v2 플러그인 설치 (없는 경우)
    - |
      if ! docker compose version > /dev/null 2>&1; then
        apk add --no-cache curl
        mkdir -p /root/.docker/cli-plugins
        curl -fsSL "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-$(uname -m)" \
          -o /root/.docker/cli-plugins/docker-compose
        chmod +x /root/.docker/cli-plugins/docker-compose
      fi
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        ENV="prod"
      else
        ENV="dev"
      fi

      if [ "$ENV" = "prod" ] && grep -Eq '^FRONTEND_PORT=80$' /volume1/docker/nanoom-project/.env.$ENV; then
        echo "Production frontend must not bind directly to port 80 on the NAS host." >&2
        echo "Set FRONTEND_PORT=3400 in .env.prod and terminate 80/443 at the NAS reverse proxy." >&2
        exit 1
      fi

    # 최신 docker-compose.deploy.yml 을 배포 디렉토리로 복사
    - cp docker-compose.deploy.yml /volume1/docker/nanoom-project/

    # 데이터 디렉토리 사전 생성 (초기 배포 시 자동 생성)
    - mkdir -p /volume1/docker/nanoom-$ENV/mongo /volume1/docker/nanoom-$ENV/udms
    # MongoDB 컨테이너(UID 999)가 데이터 디렉토리에 쓸 수 있도록 권한 부여
    - chmod 777 /volume1/docker/nanoom-$ENV/mongo

    # 배포 실행
    # --pull missing: 로컬에 없는 이미지(mongo 등)만 pull, 직접 빌드한 이미지는 로컬 사용
    - |
      ENV=$ENV \
      IMAGE_PREFIX=$IMAGE_PREFIX \
      CI_COMMIT_REF_SLUG=$CI_COMMIT_REF_SLUG \
      docker compose \
        -f /volume1/docker/nanoom-project/docker-compose.deploy.yml \
        --env-file /volume1/docker/nanoom-project/.env.$ENV \
        -p nanoom-$ENV \
        up -d --pull missing

    # 오래된 이미지 정리
    - docker image prune -f
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"
  needs:
    - build
