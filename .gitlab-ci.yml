stages:
  - build
  - deploy

# GitLab Runner 요구 설정 (NAS 도커 컨테이너 Runner):
# config.toml:
#   [[runners]]
#     executor = "docker"
#     [runners.docker]
#       volumes = ["/var/run/docker.sock:/var/run/docker.sock",
#                  "/volume1/docker:/volume1/docker"]
#
# ※ /volume1/docker/nanoom-project  ← 프로젝트 파일 (env, compose)
# ※ /volume1/docker/nanoom-prod     ← main 브랜치 데이터 (자동 생성)
# ※ /volume1/docker/nanoom-dev      ← dev  브랜치 데이터 (자동 생성)

variables:
  REGISTRY_URL: $CI_REGISTRY_IMAGE
  # 호스트 Docker 소켓 직접 사용 (dind 불필요)
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_BUILDKIT: "1"

# ─────────────────────────────────────────────
# 1. 이미지 빌드 및 레지스트리 푸시
#    NEXT_PUBLIC_* 는 빌드 타임에 번들에 embed되므로
#    브랜치별로 --build-arg 로 URL 주입
# ─────────────────────────────────────────────
build:
  stage: build
  image: docker:24.0.5
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        NEXT_PUBLIC_API_BASE_URL="http://erp.nanoom.org:8000"
        NEXT_PUBLIC_WS_URL="ws://erp.nanoom.org:8000/ws/display"
      else
        NEXT_PUBLIC_API_BASE_URL="http://erp.nanoom.org:8001"
        NEXT_PUBLIC_WS_URL="ws://erp.nanoom.org:8001/ws/display"
      fi

    # 백엔드 빌드 (prod 타겟)
    - docker build --target prod
        -t $REGISTRY_URL/backend:$CI_COMMIT_REF_SLUG
        ./backend

    # 프론트엔드 빌드 (prod 타겟 + NEXT_PUBLIC_* 빌드타임 주입)
    - docker build --target prod
        --build-arg NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL
        --build-arg NEXT_PUBLIC_WS_URL=$NEXT_PUBLIC_WS_URL
        -t $REGISTRY_URL/frontend:$CI_COMMIT_REF_SLUG
        ./frontend

    - docker push $REGISTRY_URL/backend:$CI_COMMIT_REF_SLUG
    - docker push $REGISTRY_URL/frontend:$CI_COMMIT_REF_SLUG
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"

# ─────────────────────────────────────────────
# 2. NAS 서버 배포 (SSH 없음 - Runner가 같은 Docker 호스트에서 실행)
#    /deploy = /volume1/docker/nanoom-project (Runner 볼륨 마운트)
#    .env.prod / .env.dev 파일을 /volume1/docker/nanoom-project/ 에 직접 배치
#    → GitLab CI/CD 변수 설정 없이 배포 가능
# ─────────────────────────────────────────────
deploy:
  stage: deploy
  image: docker:24.0.5
  before_script:
    # docker compose v2 플러그인 설치 (없는 경우)
    - |
      if ! docker compose version > /dev/null 2>&1; then
        apk add --no-cache curl
        mkdir -p /root/.docker/cli-plugins
        curl -fsSL "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-$(uname -m)" \
          -o /root/.docker/cli-plugins/docker-compose
        chmod +x /root/.docker/cli-plugins/docker-compose
      fi
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        ENV="prod"
      else
        ENV="dev"
      fi

    # 최신 docker-compose.deploy.yml 을 배포 디렉토리로 복사
    - cp docker-compose.deploy.yml /volume1/docker/nanoom-project/

    # 데이터 디렉토리 사전 생성 (초기 배포 시 자동 생성)
    # 컨테이너 안 경로 = 호스트 경로 → docker volume 마운트도 올바르게 작동
    - mkdir -p /volume1/docker/nanoom-$ENV/mongo /volume1/docker/nanoom-$ENV/udms

    # 배포 실행
    # ENV, REGISTRY_URL, CI_COMMIT_REF_SLUG 은 셸 변수가 --env-file보다 우선
    - |
      ENV=$ENV \
      REGISTRY_URL=$CI_REGISTRY_IMAGE \
      CI_COMMIT_REF_SLUG=$CI_COMMIT_REF_SLUG \
      docker compose \
        -f /volume1/docker/nanoom-project/docker-compose.deploy.yml \
        --env-file /volume1/docker/nanoom-project/.env.$ENV \
        -p nanoom-$ENV \
        up -d --pull always

    # 오래된 이미지 정리
    - docker image prune -f
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"
  needs:
    - build
